model:
  name_or_path: "Qwen/Qwen2.5-7B-Instruct"
projector:
  input_dim: 64
  hidden_dim: 1024
  num_tokens: 32
  mode: "pool"
data:
  jsonl: "../data/s1_alignment/train.jsonl"
  imu_roots:
    - "../data"
train:
  lr: 1.0e-5
  weight_decay: 0.01
  batch_size: 4
  num_epochs: 10
  grad_accum: 1
  warmup_steps: 100
  max_seq_len: 1536
  max_grad_norm: 1.0
  log_every: 10
  num_workers: 0
runtime:
  device: "auto"
  torch_dtype: "bfloat16"
output:
  root: "../outputs/alignment"
  run_name: "default"
seed: 42
